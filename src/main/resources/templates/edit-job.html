<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Job - NexJob</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="spinner"></div>
</div>

<div class="glass-container auth-container fade-in" style="max-width: 600px;">
    <h2 style="margin-bottom: 20px;">Edit Job</h2>

    <form th:action="@{/update-job/{id}(id=${job.id})}" method="post" th:object="${job}" onsubmit="showLoader()">
        <div class="input-group">
            <label for="title">Job Title</label>
            <input type="text" id="title" name="title" th:value="${job.title}" required>
        </div>

        <div class="input-group">
            <label for="description">Job Description</label>
            <textarea id="description" name="description" rows="5" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.2); color: var(--text-light); resize: vertical; font-family: inherit;" th:text="${job.description}"></textarea>
        </div>

        <div class="input-group">
            <label for="skills">Required Skills (comma-separated)</label>
            <input type="text" id="skills" name="skills" th:value="${job.skills}" required>
        </div>

        <div class="input-group">
            <label for="salary">Salary (Optional)</label>
            <input type="number" id="salary" name="salary" th:value="${job.salary}">
        </div>

        <div class="input-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" th:value="${job.location}" required>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn" style="flex: 1;">Update Job</button>
            <a th:href="@{/manage-jobs}" class="btn btn-secondary" style="flex: 1; text-align: center; line-height: 40px;" onclick="showLoader()">Cancel</a>
        </div>
    </form>
</div>

<script>
    function showLoader() {
        document.getElementById('loader').style.display = 'flex';
    }
</script>

</body>
</html>
