<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Dashboard - NexJob</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="spinner"></div>
</div>

<div class="glass-container dashboard-container fade-in">
    <h2>Student Dashboard</h2>

    <div class="nav-menu">
        <a th:href="@{/jobs-page}" class="btn" onclick="showLoader()">Browse Jobs</a>
        <!-- Assuming userId is in session/model but for now just link to jobs -->
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" th:text="${stats.totalApplications ?: 0}">0</div>
            <div class="stat-label">Total Applications</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color: var(--primary);" th:text="${stats.applied ?: 0}">0</div>
            <div class="stat-label">Currently Applied</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color: var(--secondary);" th:text="${stats.shortlisted ?: 0}">0</div>
            <div class="stat-label">Shortlisted</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color: var(--danger);" th:text="${stats.rejected ?: 0}">0</div>
            <div class="stat-label">Rejected</div>
        </div>
    </div>

    <div class="auth-links">
        <form th:action="@{/logout}" method="post" style="display:inline;" onsubmit="showLoader()">
            <button type="submit" class="btn-secondary" style="padding: 8px 16px; font-size: 14px;">Logout</button>
        </form>
    </div>
</div>

<script>
    function showLoader() {
        document.getElementById('loader').style.display = 'flex';
    }
</script>

</body>
</html>
