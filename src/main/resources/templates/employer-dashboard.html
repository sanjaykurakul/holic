<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employer Dashboard - NexJob</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="spinner"></div>
</div>

<div class="glass-container dashboard-container fade-in">
    <h2>Employer Dashboard</h2>

    <div class="nav-menu">
        <a th:href="@{/post-job}" class="btn" onclick="showLoader()">Post New Job</a>
        <a th:href="@{/employer/applications}" class="btn btn-secondary" onclick="showLoader()">View Applicants</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" th:text="${stats.totalJobs ?: 0}">0</div>
            <div class="stat-label">Total Jobs Posted</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color: var(--primary);" th:text="${stats.totalApplicants ?: 0}">0</div>
            <div class="stat-label">Total Applicants</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color: var(--secondary);" th:text="${stats.shortlisted ?: 0}">0</div>
            <div class="stat-label">Shortlisted Candidates</div>
        </div>
    </div>

    <div class="auth-links">
        <form th:action="@{/logout}" method="post" style="display:inline;" onsubmit="showLoader()">
            <button type="submit" class="btn-secondary" style="padding: 8px 16px; font-size: 14px;">Logout</button>
        </form>
    </div>
</div>

<script>
    function showLoader() {
        document.getElementById('loader').style.display = 'flex';
    }
</script>

</body>
</html>
