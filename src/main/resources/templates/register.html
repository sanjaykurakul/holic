<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - NexJob</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="spinner"></div>
</div>

<div class="glass-container fade-in">
    <h2>Create Account</h2>

    <form th:action="@{/auth/register}" method="post" onsubmit="showLoader()">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>

        <select name="role">
            <option value="STUDENT">I am a Job Seeker</option>
            <option value="EMPLOYER">I am an Employer</option>
        </select>

        <button type="submit">Register</button>
    </form>

    <div class="auth-links">
        Already have an account? <a th:href="@{/login}">Login here</a>
    </div>
</div>

<script>
    function showLoader() {
        document.getElementById('loader').style.display = 'flex';
    }
</script>

</body>
</html>
