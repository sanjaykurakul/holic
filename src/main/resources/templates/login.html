<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - NexJob</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="spinner"></div>
</div>

<div class="glass-container fade-in">
    <h2>Welcome Back</h2>
    
    <div th:if="${param.error}" style="color: var(--danger); text-align: center; margin-bottom: 15px; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 8px;">
        Invalid username or password.
    </div>

    <form th:action="@{/login}" method="post" onsubmit="showLoader()">
        <input type="text" name="username" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="auth-links">
        New user? <a th:href="@{/register}">Create an account</a>
    </div>
</div>

<script>
    function showLoader() {
        document.getElementById('loader').style.display = 'flex';
    }
</script>

</body>
</html>
